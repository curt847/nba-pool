<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Playoff Survivor Pool 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #f5a623;
    --text: #f0f0f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --alive: #22c55e;
    --dead: #ef4444;
    --locked: #f59e0b;
    --east: #3b82f6;
    --west: #a855f7;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; font-size: 17px; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); }
  .header-title span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .player-badge { background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 6px 16px; font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer; }
  .btn-admin { background: none; border: 1px solid var(--border2); color: var(--text2); border-radius: var(--radius); padding: 6px 14px; font-size: 14px; font-family: 'Barlow', sans-serif; cursor: pointer; transition: all 0.2s; }
  .btn-admin:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn { background: none; border: 1px solid var(--border2); color: var(--text2); border-radius: 8px; padding: 5px 12px; font-size: 12px; font-family: 'Barlow', sans-serif; cursor: pointer; transition: all 0.15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LOADING */
  .loading-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .loading-logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 32px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }
  .loading-logo span { color: var(--text); }
  .loading-sub { font-size: 14px; color: var(--text3); }
  .big-spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  /* POT BANNER */
  .pot-banner { background: linear-gradient(135deg, #1a1206 0%, #1c1226 100%); border: 1px solid rgba(245,166,35,0.25); border-radius: var(--radius); padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .pot-amount { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 48px; color: var(--accent); line-height: 1; }
  .pot-label { font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .pot-stats { display: flex; gap: 32px; flex-wrap: wrap; }
  .pot-stat { text-align: center; }
  .pot-stat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 28px; }
  .pot-stat-lbl { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .last-updated { font-size: 13px; color: var(--text3); }

  /* SECTION */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; margin-top: 28px; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); }
  .conference-tag { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.07em; }
  .tag-east { background: rgba(59,130,246,0.15); color: var(--east); border: 1px solid rgba(59,130,246,0.3); }
  .tag-west { background: rgba(168,85,247,0.15); color: var(--west); border: 1px solid rgba(168,85,247,0.3); }

  /* STANDINGS */
  .standings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 8px; }
  .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: border-color 0.2s; }
  .player-card:hover { border-color: var(--border2); }
  .player-card.is-me { border-color: rgba(245,166,35,0.35); }
  .player-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .player-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; text-transform: uppercase; letter-spacing: 0.04em; }
  .status-pill { font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
  .pill-alive { background: rgba(34,197,94,0.12); color: var(--alive); border: 1px solid rgba(34,197,94,0.25); }
  .pill-dead { background: rgba(239,68,68,0.12); color: var(--dead); border: 1px solid rgba(239,68,68,0.25); }
  .pill-elim-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .conference-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-top: 1px solid var(--border); }
  .conf-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; min-width: 40px; }
  .conf-label.east { color: var(--east); }
  .conf-label.west { color: var(--west); }
  .conf-pick { font-size: 15px; font-weight: 500; color: var(--text); }
  .conf-pick.eliminated { color: var(--dead); text-decoration: line-through; }
  .conf-pick.alive { color: var(--alive); }
  .conf-pick.no-pick { color: var(--text3); font-style: italic; }
  .conf-pick.pending { color: var(--locked); }
  .pick-round { font-size: 12px; color: var(--text3); margin-left: 6px; }
  .used-teams { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .used-team-tag { font-size: 12px; padding: 3px 8px; border-radius: 4px; background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .tiebreaker-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0 2px; border-top: 1px solid var(--border); margin-top: 4px; }
  .tiebreaker-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); }
  .tiebreaker-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; color: var(--accent); }
  .tiebreaker-value.zero { color: var(--text3); }

  /* SERIES */
  .series-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; margin-bottom: 8px; }
  .series-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; position: relative; overflow: hidden; }
  .series-card.locked::before,.series-card.complete::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .series-card.locked::before { background: var(--locked); }
  .series-card.complete::before { background: var(--alive); }
  .series-round-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .series-matchup { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .series-team { flex: 1; text-align: center; }
  .series-team-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 0.04em; }
  .series-team-name.winner { color: var(--alive); }
  .series-team-name.loser { color: var(--text3); text-decoration: line-through; }
  .series-seed { font-size: 12px; color: var(--text3); }
  .series-wins { font-size: 14px; color: var(--text2); margin-top: 2px; }
  .series-vs { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; color: var(--text3); }
  .series-status-badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 10px; }
  .badge-pre { background: rgba(90,90,114,0.2); color: var(--text3); }
  .badge-locked { background: rgba(245,158,11,0.15); color: var(--locked); }
  .badge-complete { background: rgba(34,197,94,0.12); color: var(--alive); }

  /* PICK PANEL */
  .pick-panel { background: var(--surface); border: 1px solid rgba(245,166,35,0.3); border-radius: var(--radius); padding: 24px; margin-bottom: 28px; }
  .pick-panel-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 6px; }
  .pick-panel-sub { font-size: 15px; color: var(--text2); margin-bottom: 20px; }
  .pick-conference-section { margin-bottom: 20px; }
  .pick-conf-label { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .pick-conf-label.east { color: var(--east); }
  .pick-conf-label.west { color: var(--west); }
  .pick-teams-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .pick-team-btn { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 18px; font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer; transition: all 0.15s; }
  .pick-team-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pick-team-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .pick-team-btn.selected { background: rgba(245,166,35,0.15); border-color: var(--accent); color: var(--accent); }
  .pick-team-btn.locked-series { opacity: 0.3; cursor: not-allowed; }
  .pick-already-made { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--alive); display: flex; align-items: center; gap: 8px; }

  /* FINALS */
  .finals-panel { background: linear-gradient(135deg, #0f1a0f 0%, #0f0f1a 100%); border: 1px solid rgba(34,197,94,0.2); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 28px; }
  .finals-panel-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--alive); margin-bottom: 4px; }
  .finals-panel-sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .finals-inputs { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .finals-field { display: flex; flex-direction: column; gap: 6px; }
  .finals-field label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; }
  .finals-field select { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); padding: 8px 12px; font-family: 'Barlow', sans-serif; font-size: 14px; min-width: 160px; }
  .finals-field select option { background: #1c1c26; }

  /* BUTTONS */
  .btn-primary { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px 24px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.15s; margin-top: 8px; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); border-radius: 8px; padding: 8px 16px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }
  .btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--dead); border-radius: 8px; padding: 8px 16px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }

  /* LOGIN */
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; }
  .login-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
  .login-logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 32px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .login-logo span { color: var(--text); }
  .login-sub { font-size: 15px; color: var(--text2); margin-bottom: 28px; }
  .login-field { margin-bottom: 14px; text-align: left; }
  .login-field label { display: block; font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .login-field input, .login-field select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); padding: 12px 14px; font-family: 'Barlow', sans-serif; font-size: 16px; }
  .login-field input:focus, .login-field select:focus { outline: none; border-color: var(--accent); }
  .login-field select option { background: #1c1c26; }
  .login-btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
  .login-btn:hover { opacity: 0.88; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-new { margin-top: 12px; }
  .login-new-btn { background: none; border: 1px solid var(--border2); color: var(--text2); border-radius: 8px; padding: 10px; width: 100%; font-family: 'Barlow', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s; }
  .login-new-btn:hover { border-color: var(--text2); color: var(--text); }
  .login-error { color: var(--dead); font-size: 13px; margin-top: 10px; min-height: 20px; }

  /* ADMIN */
  .admin-panel { background: var(--surface); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 28px; }
  .admin-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 16px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--dead); margin-bottom: 16px; }
  .admin-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .admin-field { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .admin-field input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); padding: 8px 12px; font-family: 'Barlow', sans-serif; font-size: 13px; }

  /* MODAL */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
  .modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 100%; max-width: 420px; }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .modal-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); padding: 9px 13px; font-family: 'Barlow', sans-serif; font-size: 14px; }
  .modal-field input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .modal-actions button { flex: 1; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 18px; font-size: 14px; font-weight: 500; z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.3s; max-width: 320px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(34,197,94,0.4); color: var(--alive); }
  .toast.error { border-color: rgba(239,68,68,0.4); color: var(--dead); }

  /* MISC */
  .divider { height: 1px; background: var(--border); margin: 32px 0; }
  .empty-state { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .standings-grid { grid-template-columns: 1fr; }
    .series-grid { grid-template-columns: 1fr; }
    .pot-banner { flex-direction: column; }
    .pick-teams-grid { gap: 6px; }
    .pick-team-btn { padding: 7px 12px; font-size: 12px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const CONFIG = {
  // PROXY_URL: 'https://script.google.com/macros/s/AKfycby_2oOMaGHt72Id8Uett-G-NAWfVGjYgGouhXD_ntuledvU249LvdcQsgolya_tbwThsg/exec', // ← restore when going live
  PROXY_URL: '', // demo mode — leave blank to use local demo data
  ADMIN_PASSWORD: 'playoff2025',  // must match Code.gs ADMIN_PASSWORD
  BUY_IN: 20,
  REFRESH_INTERVAL: 300000        // 5 minutes
};

// ============================================================
// STATE
// ============================================================
let state = {
  players: [],
  series: [],
  rounds: [],
  currentPlayer: null,   // id of logged-in player
  currentPin: null,       // kept in memory for API calls, never stored
  isAdmin: false,
  lastUpdated: null,
  loading: true,
  demoMode: false
};

let selectedPicks = { east: null, west: null };

// ============================================================
// API LAYER — all calls go through here
// ============================================================
const DEMO_MODE = !CONFIG.PROXY_URL;

async function apiGet(action) {
  if (DEMO_MODE) throw new Error('Demo mode — no API.');
  const res = await fetch(`${CONFIG.PROXY_URL}?action=${action}`);
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'API error');
  return json.data;
}

async function apiPost(body) {
  if (DEMO_MODE) throw new Error('Demo mode — no API.');
  const res = await fetch(CONFIG.PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'API error');
  return json.data;
}

// ============================================================
// LOAD STATE (from API or demo)
// ============================================================
async function loadState() {
  if (DEMO_MODE) {
    loadDemoData();
    state.loading = false;
    state.demoMode = true;
    return;
  }
  try {
    const data = await apiGet('getState');
    state.players    = data.players    || [];
    state.series     = data.series     || [];
    state.rounds     = data.rounds     || [];
    state.lastUpdated = data.lastUpdated || null;
    autoUpdateEliminations();
  } catch(e) {
    showToast('Could not connect to server. Check your URL.', 'error');
  }
  state.loading = false;
}

async function refreshState() {
  if (DEMO_MODE) return; // demo data is static
  try {
    const data = await apiGet('getState');
    state.players    = data.players    || [];
    state.series     = data.series     || [];
    state.lastUpdated = data.lastUpdated || null;
    autoUpdateEliminations();
  } catch(e) {
    showToast('Refresh failed.', 'error');
  }
}

// ============================================================
// DEMO DATA
// ============================================================
function loadDemoData() {
  state.players = [];
  // ── RICH DEMO ──────────────────────────────────────────────
  // Round 1: all 8 series complete with winners
  // Round 2: all 4 series open (picks available)
  // EAST R1 winners: CLE(1), ORL(7), NYK(3), MIL(5)
  // WEST R1 winners: OKC(1), HOU(2), MIN(6), GSW(5)
  // ──────────────────────────────────────────────────────────
  state.series = [
    // EAST R1 (complete)
    { id:'e1', round:1, roundName:'First Round', conference:'Eastern', status:'post', tipped:true, winner:'Cleveland Cavaliers', endDate:'2025-04-28', teams:[{id:'1',name:'Cleveland Cavaliers',abbrev:'CLE',seed:1,wins:4,logo:'https://a.espncdn.com/i/teamlogos/nba/500/cle.png'},{id:'2',name:'Miami Heat',abbrev:'MIA',seed:8,wins:1,logo:'https://a.espncdn.com/i/teamlogos/nba/500/mia.png'}] },

// ============================================================
// LOGIC HELPERS
// ============================================================
function getConferenceSeries(conf) {
  return state.series.filter(s => s.conference && s.conference.toLowerCase().includes(conf.toLowerCase()));
}

function getCurrentRound(conf) {
  const active = getConferenceSeries(conf).filter(s => s.status !== 'post');
  if (!active.length) return null;
  return Math.min(...active.map(s => s.round));
}

function getPickableTeams(conf, playerId) {
  const player = state.players.find(p => p.id === playerId);
  if (!player) return [];
  const usedTeams = (conf === 'east' ? player.eastPicks : player.westPicks || []).map(p => p.team);
  const currentRound = getCurrentRound(conf);
  if (!currentRound) return [];
  const result = [];
  getConferenceSeries(conf).filter(s => s.round === currentRound && s.status !== 'post').forEach(series => {
    series.teams.forEach(team => {
      if (!usedTeams.includes(team.name)) {
        result.push({ ...team, seriesId: series.id, locked: series.tipped });
      }
    });
  });
  return result;
}

function getPlayerCurrentPick(conf, playerId) {
  const player = state.players.find(p => p.id === playerId);
  if (!player) return null;
  const picks = conf === 'east' ? (player.eastPicks || []) : (player.westPicks || []);
  const currentRound = getCurrentRound(conf);
  if (!currentRound) return null;
  return picks.find(p => p.round === currentRound) || null;
}

function getAllUsedTeams(conf, playerId) {
  const player = state.players.find(p => p.id === playerId);
  if (!player) return [];
  return (conf === 'east' ? (player.eastPicks || []) : (player.westPicks || [])).map(p => p.team);
}

function autoUpdateEliminations() {
  state.series.forEach(series => {
    if (series.status === 'post' && series.winner) {
      const losingTeams = series.teams.filter(t => t.name !== series.winner).map(t => t.name);
      const conf = series.conference.toLowerCase().includes('east') ? 'east' : 'west';
      state.players.forEach(player => {
        const picks = conf === 'east' ? (player.eastPicks || []) : (player.westPicks || []);
        const pick = picks.find(p => p.round === series.round);
        if (pick && losingTeams.includes(pick.team)) {
          if (conf === 'east' && player.eastAlive) {
            player.eastAlive = false;
            player.eastEliminatedDate = series.endDate || new Date().toISOString().split('T')[0];
          }
          if (conf === 'west' && player.westAlive) {
            player.westAlive = false;
            player.westEliminatedDate = series.endDate || new Date().toISOString().split('T')[0];
          }
        }
      });
    }
  });
}

function isFinalsTime() {
  return state.series.some(s => s.round === 4 && s.status === 'post') || state.series.some(s => s.round === 5);
}

function calcTiebreakerTotal(player) {
  let total = 0;
  const checkPicks = (picks, conf) => {
    (picks || []).forEach(pick => {
      const series = state.series.find(s =>
        s.conference && s.conference.toLowerCase().includes(conf.toLowerCase()) &&
        s.round === pick.round &&
        s.teams && s.teams.some(t => t.name === pick.team)
      );
      if (!series || series.status !== 'post' || !series.winner) return;
      if (series.winner === pick.team) {
        const teamObj = series.teams.find(t => t.name === pick.team);
        total += teamObj ? (parseInt(teamObj.seed) || 0) : 0;
      }
    });
  };
  checkPicks(player.eastPicks, 'east');
  checkPicks(player.westPicks, 'west');
  return total;
}

function getStandings() {
  return state.players.map(p => {
    const holdsBoth = p.eastAlive && p.westAlive;
    const holdsOne  = (p.eastAlive || p.westAlive) && !holdsBoth;
    const eliminated = !p.eastAlive && !p.westAlive;
    let lastSurvived = null;
    if (eliminated) {
      const d1 = p.eastEliminatedDate, d2 = p.westEliminatedDate;
      if (d1 && d2) lastSurvived = d1 > d2 ? d1 : d2;
      else lastSurvived = d1 || d2;
    }
    const tiebreakerTotal = calcTiebreakerTotal(p);
    return { ...p, holdsBoth, holdsOne, eliminated, lastSurvived, tiebreakerTotal };
  }).sort((a, b) => {
    if (a.holdsBoth && !b.holdsBoth) return -1;
    if (!a.holdsBoth && b.holdsBoth) return 1;
    if (a.holdsOne && b.eliminated) return -1;
    if (a.eliminated && b.holdsOne) return 1;
    return a.name.localeCompare(b.name);
  });
}

function isRoundRevealed(conf) {
  const currentRound = getCurrentRound(conf);
  if (!currentRound) return true;
  const roundSeries = getConferenceSeries(conf).filter(s => s.round === currentRound);
  if (roundSeries.every(s => s.status === 'post')) return true;
  if (!roundSeries.some(s => !s.tipped)) return true;
  const alivePlayers = state.players.filter(p => conf === 'east' ? p.eastAlive : p.westAlive);
  if (!alivePlayers.length) return true;
  return alivePlayers.every(p => {
    const picks = conf === 'east' ? (p.eastPicks || []) : (p.westPicks || []);
    return picks.some(pk => pk.round === currentRound);
  });
}

function getRoundPickCounts(conf) {
  const currentRound = getCurrentRound(conf);
  if (!currentRound) return { picked: 0, total: 0 };
  const alivePlayers = state.players.filter(p => conf === 'east' ? p.eastAlive : p.westAlive);
  const picked = alivePlayers.filter(p => {
    const picks = conf === 'east' ? (p.eastPicks || []) : (p.westPicks || []);
    return picks.some(pk => pk.round === currentRound);
  }).length;
  return { picked, total: alivePlayers.length };
}

// SUBMIT ACTIONS
// ============================================================
async function submitPick(conf, teamName, round) {
  const player = state.players.find(p => p.id === state.currentPlayer);
  if (!player) return false;

  if (DEMO_MODE) {
    // In demo mode, just mutate local state
    const picks = conf === 'east' ? (player.eastPicks = player.eastPicks || []) : (player.westPicks = player.westPicks || []);
    if (picks.find(p => p.round === round)) return false;
    picks.push({ team: teamName, round, date: new Date().toISOString() });
    return true;
  }

  try {
    await apiPost({ action: 'submitPick', playerId: player.id, pin: state.currentPin, conference: conf, team: teamName, round });
    // Optimistically update local state
    const picks = conf === 'east' ? (player.eastPicks = player.eastPicks || []) : (player.westPicks = player.westPicks || []);
    picks.push({ team: teamName, round, date: new Date().toISOString() });
    return true;
  } catch(e) {
    showToast(e.message || 'Could not submit pick.', 'error');
    return false;
  }
}

async function submitFinalsPick(champion, games) {
  const player = state.players.find(p => p.id === state.currentPlayer);
  if (!player) return;

  player.finalsPick  = champion;
  player.finalsGames = parseInt(games);

  if (!DEMO_MODE) {
    try {
      await apiPost({ action: 'submitFinalsPick', playerId: player.id, pin: state.currentPin, finalsPick: champion, finalsGames: parseInt(games) });
    } catch(e) {
      showToast(e.message || 'Could not submit finals pick.', 'error');
    }
  }
}

function renderPickPanel() {
  const player = state.players.find(p => p.id === state.currentPlayer);
  if (!player) return '';
  if (!player.eastAlive && !player.westAlive) {
    return `<div class="pick-panel" style="border-color:rgba(239,68,68,0.2)">
      <div class="pick-panel-title" style="color:var(--dead)">You've Been Eliminated</div>
      <div class="pick-panel-sub">Both your East and West picks have been knocked out. Better luck next year.</div>
    </div>`;
  }

  const mkSection = (conf) => {
    if (!(conf === 'east' ? player.eastAlive : player.westAlive)) return '';
    const currentRound  = getCurrentRound(conf);
    const existingPick  = getPlayerCurrentPick(conf, player.id);
    const pickable      = getPickableTeams(conf, player.id);
    const usedTeams     = getAllUsedTeams(conf, player.id);
    const label         = conf === 'east' ? 'East' : 'West';

    if (existingPick) return `
      <div class="pick-conference-section">
        <div class="pick-conf-label ${conf}">${label} — Round ${currentRound || '?'}</div>
        <div class="pick-already-made">✓ Picked: <strong>${existingPick.team}</strong></div>
        ${usedTeams.length > 1 ? `<div class="used-teams">${usedTeams.map(t=>`<span class="used-team-tag">${t}</span>`).join('')}</div>` : ''}
      </div>`;

    if (currentRound) return `
      <div class="pick-conference-section">
        <div class="pick-conf-label ${conf}">${label} — Round ${currentRound} Pick</div>
        <div class="pick-teams-grid" id="${conf}-pick-grid">
          ${pickable.length === 0 ? `<div style="color:var(--text3);font-size:13px;">No available teams — all series have tipped or teams already used.</div>` : ''}
          ${pickable.map(t => `
            <button class="pick-team-btn${t.locked ? ' locked-series' : ''}"
              data-team="${t.name}" data-conf="${conf}" data-round="${currentRound}"
              ${t.locked ? 'disabled title="Series already started"' : ''}
              onclick="handlePickSelect(this,'${conf}')">
              ${t.abbrev || t.name}${t.seed ? ` <span style="opacity:0.5;font-size:11px;">#${t.seed}</span>` : ''}

        ${usedTeams.length > 0 ? `<div class="used-teams" style="margin-top:10px">${usedTeams.map(t=>`<span class="used-team-tag">${t}</span>`).join('')}</div>` : ''}
        <button class="btn-primary" id="${conf}-submit-btn" disabled onclick="handleSubmitPick('${conf}')">Lock ${label} Pick</button>
      </div>`;

    return `<div class="pick-conference-section"><div class="pick-conf-label ${conf}">${label}</div><div style="font-size:13px;color:var(--text3)">No active round yet.</div></div>`;
  };

  return `<div class="pick-panel">
    <div class="pick-panel-title">Make Your Picks</div>
    <div class="pick-panel-sub">Select a team to survive into the next round. You cannot reuse a team.</div>
    ${mkSection('east')}

  const eastRevealed = isRoundRevealed('east');
  const westRevealed = isRoundRevealed('west');
  const eastCounts   = getRoundPickCounts('east');
  const westCounts   = getRoundPickCounts('west');
  const banners = [];

  if (!eastRevealed && eastCounts.total > 0) banners.push(`
    <div style="display:flex;align-items:center;gap:10px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;">

      <span style="color:var(--text2);margin-left:auto;">${eastCounts.picked} of ${eastCounts.total} players have picked</span>
    </div>`);

  if (!westRevealed && westCounts.total > 0) banners.push(`
    <div style="display:flex;align-items:center;gap:10px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.2);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;">
      <span>🔒</span><span style="color:var(--west);font-weight:600;">West picks hidden</span>
      <span style="color:var(--text2);margin-left:auto;">${westCounts.picked} of ${westCounts.total} players have picked</span>
    </div>`);

  if (eastRevealed && westRevealed && (eastCounts.total > 0 || westCounts.total > 0)) banners.push(`
    <div style="display:flex;align-items:center;gap:10px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;">
      <span>🎉</span><span style="color:var(--alive);font-weight:600;">All picks are in — round revealed!</span>
    </div>`);

  return `
    <div class="section-header"><div class="section-title">Standings</div></div>
    ${banners.join('')}
    <div class="standings-grid">
      ${standings.map(p => renderPlayerCard(p, eastRevealed, westRevealed)).join('')}
    </div>`;
}

function renderPlayerCard(p, eastRevealed, westRevealed) {
  const isMe = p.id === state.currentPlayer;
  const eastPicks = p.eastPicks || [], westPicks = p.westPicks || [];
  const currentEastRound = getCurrentRound('east');
  const currentWestRound = getCurrentRound('west');

  const latestEast = eastPicks.find(pk => pk.round === currentEastRound) || eastPicks[eastPicks.length - 1];
  const latestWest = westPicks.find(pk => pk.round === currentWestRound) || westPicks[westPicks.length - 1];
  const prevEastPicks = eastPicks.filter(pk => pk.round !== currentEastRound);
  const prevWestPicks = westPicks.filter(pk => pk.round !== currentWestRound);

  const eastStatus = p.eastAlive ? 'alive' : 'eliminated';
  const westStatus = p.westAlive ? 'alive' : 'eliminated';

  const showEastTeam = eastRevealed || isMe;
  const showWestTeam = westRevealed || isMe;

  const mkPickDisplay = (latest, currentRound, status, showTeam) => {
    if (latest && latest.round === currentRound) {
      return showTeam
        ? `<span class="conf-pick ${status}">${latest.team} <span class="pick-round">Rd ${latest.round}</span></span>`
        : `<span class="conf-pick pending" style="font-size:12px;">✓ Pick submitted</span>`;
    } else if (latest) {
      return `<span class="conf-pick ${status}">${latest.team} <span class="pick-round">Rd ${latest.round}</span></span>`;
    }
    return `<span class="conf-pick no-pick">No pick yet</span>`;
  };

  return `<div class="player-card${isMe ? ' is-me' : ''}">
    <div class="player-card-header">
      <div class="player-name">${p.name}${isMe ? ' <span style="font-size:11px;color:var(--accent)">YOU</span>' : ''}</div>
      <div>
        <div class="status-pill ${(p.eastAlive || p.westAlive) ? 'pill-alive' : 'pill-dead'}">
          ${p.holdsBoth ? '★ Both' : (p.eastAlive || p.westAlive) ? 'Alive' : 'Out'}
        </div>
        ${p.eliminated && p.lastSurvived ? `<div class="pill-elim-date">Out ${p.lastSurvived}</div>` : ''}
      </div>
    </div>
    <div class="conference-row">
      <span class="conf-label east">EAST</span>
      ${mkPickDisplay(latestEast, currentEastRound, eastStatus, showEastTeam)}
    </div>
    <div class="conference-row">
      <span class="conf-label west">WEST</span>
      ${mkPickDisplay(latestWest, currentWestRound, westStatus, showWestTeam)}
    </div>
    ${(prevEastPicks.length > 0 || prevWestPicks.length > 0) ? `
    <div class="used-teams" style="margin-top:10px">
      ${[...prevEastPicks.map(pp=>`<span class="used-team-tag" style="color:var(--east);border-color:rgba(59,130,246,0.2)">${pp.team}</span>`),
         ...prevWestPicks.map(pp=>`<span class="used-team-tag" style="color:var(--west);border-color:rgba(168,85,247,0.2)">${pp.team}</span>`)].join('')}
    </div>` : ''}
    ${p.finalsPick && eastRevealed && westRevealed ? `<div style="font-size:11px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">Finals: ${p.finalsPick} in ${p.finalsGames}</div>` : ''}
    <div class="tiebreaker-row">
      <span class="tiebreaker-label">TB Total</span>
      <span class="tiebreaker-value${p.tiebreakerTotal === 0 ? ' zero' : ''}">${p.tiebreakerTotal}</span>
    </div>
  </div>`;
}

function renderSeriesSection() {
  const eastSeries = getConferenceSeries('east');
  const westSeries = getConferenceSeries('west');
  if (!eastSeries.length && !westSeries.length) return `<div class="divider"></div><div class="empty-state">Playoff bracket not yet loaded.</div>`;

  const renderConf = (label, series) => {
    const grouped = {};
    series.forEach(s => {
      const key = s.roundName || ('Round ' + s.round);
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(s);
    });
    return Object.entries(grouped).map(([rName, rSeries]) => `
      <div class="section-header" style="margin-top:22px">
        <div class="section-title">${label} — ${rName}</div>
        <span class="conference-tag tag-${label.toLowerCase()}">${label}</span>
      </div>
      <div class="series-grid">${rSeries.map(renderSeriesCard).join('')}</div>
    `).join('');
  };

  return `
    <div class="divider"></div>
    <div class="section-header"><div class="section-title">Playoff Bracket</div></div>
    ${renderConf('Eastern', eastSeries)}
    ${renderConf('Western', westSeries)}`;
}

function renderSeriesCard(s) {
  const t1 = s.teams[0] || {}, t2 = s.teams[1] || {};
  let statusClass = 'pre', statusLabel = 'Upcoming', badgeClass = 'badge-pre';
  if (s.tipped && s.status !== 'post') { statusClass = 'locked'; statusLabel = 'In Progress'; badgeClass = 'badge-locked'; }
  if (s.status === 'post') { statusClass = 'complete'; statusLabel = 'Complete'; badgeClass = 'badge-complete'; }
  const t1W = s.winner === t1.name, t2W = s.winner === t2.name, hasW = !!s.winner;

  const mkTeam = (team, isWinner, isLoser) => `
    <div class="series-team" style="opacity:${isLoser?'0.4':'1'}">
      <div class="series-seed">#${team.seed||'?'}</div>
      ${team.logo ? `<img src="${team.logo}" alt="${team.abbrev}" style="width:52px;height:52px;object-fit:contain;margin:6px auto;display:block;${isLoser?'filter:grayscale(1)':''}" onerror="this.style.display='none'" />` : `<div style="width:52px;height:52px;margin:6px auto;background:var(--surface2);border-radius:50%;"></div>`}
      <div class="series-team-name ${isWinner?'winner':isLoser?'loser':''}">${team.abbrev||team.name||'?'}</div>
      <div style="font-size:13px;color:var(--text3);margin-top:2px;">${team.name||''}</div>
      <div class="series-wins">${team.wins||0} W</div>
      ${isWinner ? `<div style="font-size:12px;color:var(--alive);font-weight:700;margin-top:4px;">✓ Winner</div>` : ''}
    </div>`;

  return `<div class="series-card ${statusClass}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="series-round-label" style="margin-bottom:0">${s.roundName||'Round '+s.round}</div>
      <span class="series-status-badge ${badgeClass}">${statusLabel}</span>
    </div>
    <div class="series-matchup">
      ${mkTeam(t1, t1W, hasW && !t1W)}
      <div class="series-vs">vs</div>
      ${mkTeam(t2, t2W, hasW && !t2W)}
    </div>
  </div>`;
}

function renderAdminPanel() {
  return `<div class="admin-panel">
    <div class="admin-title">⚠ Commissioner Panel</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:14px;">Manage players, override statuses, reset PINs.</div>
    <div class="admin-grid">
      ${state.players.map(p => `
        <div style="background:var(--surface2);border-radius:8px;padding:10px 14px;font-size:14px;">
          <strong>${p.name}</strong> <span style="font-size:12px;color:var(--text3)">PIN: ${p.pin || '—'}</span>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <button class="btn-secondary" onclick="adminToggle('${p.id}','east')">${p.eastAlive ? 'Elim East' : 'Restore East'}</button>
            <button class="btn-secondary" onclick="adminToggle('${p.id}','west')">${p.westAlive ? 'Elim West' : 'Restore West'}</button>
            <button class="btn-secondary" onclick="adminResetPin('${p.id}')">Reset PIN</button>
            <button class="btn-danger" onclick="adminRemovePlayer('${p.id}')">Remove</button>
          </div>
        </div>`).join('')}
    </div>
    <div class="admin-field" style="margin-top:8px">
      <input type="text" id="admin-add-name" placeholder="Add player name" style="width:200px"/>
      <input type="text" id="admin-add-pin" placeholder="PIN (optional)" maxlength="4" style="width:100px"/>
      <button class="btn-secondary" onclick="adminAddPlayer()">Add Player</button>
    </div>
    <div style="margin-top:12px">
      <button class="btn-danger" onclick="handleRefresh()">Force Refresh</button>
    </div>
  </div>`;
}

function renderAdminModal() {
  return `<div class="modal-overlay" id="admin-modal" style="display:none">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">Commissioner Login</div>
      <div class="modal-field" id="modal-body">
        <label>Password</label>
        <input type="password" id="admin-pw-input" placeholder="Enter password" />
      </div>
      <div class="login-error" id="modal-error"></div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="handleAdminLogin()">Enter</button>
      </div>
    </div>
  </div>`;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function attachLoginEvents() {
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('login-select'))  handleLogin();
      if (document.getElementById('new-player-name')) handleNewPlayer();
      if (document.getElementById('admin-pw-input')) handleAdminLogin();
    }
  });
}

function attachMainEvents() {
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('admin-pw-input')) handleAdminLogin();
  });
}

function handleLogin() {
  const sel = document.getElementById('login-select');
  if (!sel || !sel.value) { showError('login-error', 'Please select your name.'); return; }
  const pin = document.getElementById('login-pin')?.value?.trim();
  if (!pin) { showError('login-error', 'Please enter your 4-digit PIN.'); return; }
  const player = state.players.find(p => p.id === sel.value);
  if (!player) { showError('login-error', 'Player not found.'); return; }
  if (player.pin !== pin) { showError('login-error', 'Incorrect PIN. Try again.'); return; }
  state.currentPlayer = sel.value;
  state.currentPin    = pin;
  render();
}

function showNewPlayer() {
  const box = document.querySelector('.login-box');
  box.innerHTML = `
    <div class="login-logo">NBA <span>Pool</span></div>
    <div class="login-sub">Join the 2025 Playoff Survivor Pool</div>
    <div class="login-field"><label>Your name</label><input type="text" id="new-player-name" placeholder="Enter your name" autofocus /></div>
    <div class="login-field"><label>Choose a 4-digit PIN</label><input type="password" inputmode="numeric" maxlength="4" id="new-player-pin" placeholder="e.g. 1234" /></div>
    <div class="login-field"><label>Confirm PIN</label><input type="password" inputmode="numeric" maxlength="4" id="new-player-pin2" placeholder="Re-enter PIN" /></div>
    <button class="login-btn" id="join-btn" onclick="handleNewPlayer()">Join Pool →</button>
    <div style="margin-top:10px"><button class="login-new-btn" onclick="render()">← Back</button></div>
    <div class="login-error" id="login-error"></div>`;
  attachLoginEvents();
}

async function handleNewPlayer() {
  const nameInp = document.getElementById('new-player-name');
  const pinInp  = document.getElementById('new-player-pin');
  const pin2Inp = document.getElementById('new-player-pin2');
  const btn     = document.getElementById('join-btn');

  if (!nameInp?.value.trim()) { showError('login-error', 'Please enter your name.'); return; }
  const name = nameInp.value.trim();
  const pin  = pinInp?.value?.trim();
  const pin2 = pin2Inp?.value?.trim();

  if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) { showError('login-error', 'PIN must be exactly 4 digits.'); return; }
  if (pin !== pin2) { showError('login-error', 'PINs do not match.'); return; }
  if (state.players.find(p => p.name.toLowerCase() === name.toLowerCase())) { showError('login-error', 'That name is already taken.'); return; }

  if (btn) { btn.disabled = true; btn.textContent = 'Joining…'; }

  if (DEMO_MODE) {
    const id = 'p_' + Date.now();
    state.players.push({ id, name, pin, eastPicks:[], westPicks:[], eastAlive:true, westAlive:true, eastEliminatedDate:null, westEliminatedDate:null, finalsPick:null, finalsGames:null });
    state.currentPlayer = id;
    state.currentPin    = pin;
    showToast('Welcome to the pool, ' + name + '!', 'success');
    render();
    return;
  }

  try {
    const result = await apiPost({ action: 'addPlayer', name, pin });
    state.players.push({ id: result.id, name, pin, eastPicks:[], westPicks:[], eastAlive:true, westAlive:true, eastEliminatedDate:null, westEliminatedDate:null, finalsPick:null, finalsGames:null });
    state.currentPlayer = result.id;
    state.currentPin    = pin;
    showToast('Welcome to the pool, ' + name + '!', 'success');
    render();
  } catch(e) {
    showError('login-error', e.message || 'Could not join pool.');
    if (btn) { btn.disabled = false; btn.textContent = 'Join Pool →'; }
  }
}

function handleLogout() {
  state.currentPlayer = null;
  state.currentPin    = null;
  state.isAdmin       = false;
  selectedPicks = { east: null, west: null };
  render();
}

function handlePickSelect(btn, conf) {
  const grid = document.getElementById(conf + '-pick-grid');
  if (!grid) return;
  grid.querySelectorAll('.pick-team-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedPicks[conf] = { team: btn.dataset.team, round: parseInt(btn.dataset.round) };
  const submitBtn = document.getElementById(conf + '-submit-btn');
  if (submitBtn) submitBtn.disabled = false;
}

async function handleSubmitPick(conf) {
  const pick = selectedPicks[conf];
  if (!pick) return;
  const btn = document.getElementById(conf + '-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }
  const ok = await submitPick(conf, pick.team, pick.round);
  if (ok) {
    showToast(conf.toUpperCase() + ' pick locked: ' + pick.team, 'success');
    selectedPicks[conf] = null;
    render();
  } else {
    if (btn) { btn.disabled = false; btn.textContent = 'Lock ' + (conf === 'east' ? 'East' : 'West') + ' Pick'; }
  }
}

async function handleFinalsPick() {
  const champ = document.getElementById('finals-champ')?.value;
  const games = document.getElementById('finals-games')?.value;
  if (!champ || !games) { showToast('Please complete both fields.', 'error'); return; }
  await submitFinalsPick(champ, games);
  showToast('Finals picks submitted!', 'success');
  render();
}

async function handleRefresh() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.innerHTML = '<span class="spinner"></span>';
  await refreshState();
  render();
  showToast('Data refreshed.', 'success');
}

function showAdminLogin() {
  document.getElementById('admin-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('admin-pw-input')?.focus(), 100);
}

function closeModal() {
  document.getElementById('admin-modal').style.display = 'none';
}

function handleAdminLogin() {
  const pw = document.getElementById('admin-pw-input')?.value;
  if (pw === CONFIG.ADMIN_PASSWORD) {
    state.isAdmin = true;
    closeModal();
    if (!state.currentPlayer && state.players.length > 0) state.currentPlayer = state.players[0].id;
    render();
    showToast('Commissioner mode active.', 'success');
  } else {
    showError('modal-error', 'Incorrect password.');
  }
}

async function adminToggle(playerId, conf) {
  const player = state.players.find(p => p.id === playerId);
  if (!player) return;
  const alive = conf === 'east' ? !player.eastAlive : !player.westAlive;
  const today = new Date().toISOString().split('T')[0];

  if (conf === 'east') { player.eastAlive = alive; player.eastEliminatedDate = alive ? null : today; }
  else { player.westAlive = alive; player.westEliminatedDate = alive ? null : today; }

  if (!DEMO_MODE) {
    try { await apiPost({ action: 'adminElim', adminPassword: CONFIG.ADMIN_PASSWORD, playerId, conference: conf, alive }); }
    catch(e) { showToast(e.message || 'Admin action failed.', 'error'); }
  }
  render();
  showToast(`${player.name} ${conf.toUpperCase()} status updated.`, 'success');
}

async function adminResetPin(playerId) {
  const player = state.players.find(p => p.id === playerId);
  if (!player) return;
  const newPin = prompt(`Reset PIN for ${player.name}. Enter new 4-digit PIN:`);
  if (!newPin || !/^\d{4}$/.test(newPin.trim())) { showToast('Invalid PIN — must be 4 digits.', 'error'); return; }
  player.pin = newPin.trim();
  if (!DEMO_MODE) {
    try { await apiPost({ action: 'adminResetPin', adminPassword: CONFIG.ADMIN_PASSWORD, playerId, newPin: newPin.trim() }); }
    catch(e) { showToast(e.message || 'Reset failed.', 'error'); }
  }
  render();
  showToast(`${player.name}'s PIN reset.`, 'success');
}

async function adminRemovePlayer(playerId) {
  if (!confirm('Remove this player and all their picks?')) return;
  state.players = state.players.filter(p => p.id !== playerId);
  if (state.currentPlayer === playerId) state.currentPlayer = state.players[0]?.id || null;
  if (!DEMO_MODE) {
    try { await apiPost({ action: 'adminRemovePlayer', adminPassword: CONFIG.ADMIN_PASSWORD, playerId }); }
    catch(e) { showToast(e.message || 'Remove failed.', 'error'); }
  }
  render();
}

async function adminAddPlayer() {
  const nameInp = document.getElementById('admin-add-name');
  const pinInp  = document.getElementById('admin-add-pin');
  if (!nameInp?.value.trim()) return;
  const name = nameInp.value.trim();
  const pin  = pinInp?.value?.trim() || '0000';
  if (state.players.find(p => p.name.toLowerCase() === name.toLowerCase())) { showToast('Player already exists.', 'error'); return; }
  const id = 'p_' + Date.now();
  state.players.push({ id, name, pin, eastPicks:[], westPicks:[], eastAlive:true, westAlive:true, eastEliminatedDate:null, westEliminatedDate:null, finalsPick:null, finalsGames:null });
  if (!DEMO_MODE) {
    try { await apiPost({ action: 'adminAddPlayer', adminPassword: CONFIG.ADMIN_PASSWORD, name, pin }); }
    catch(e) { showToast(e.message || 'Add failed.', 'error'); }
  }
  nameInp.value = '';
  if (pinInp) pinInp.value = '';
  render();
  showToast(name + ' added to pool.', 'success');
}

// ============================================================
// UTILITIES
// ============================================================
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}

function showError(id, msg) {
  const el = document.getElementById(id);
  if (el) el.textContent = msg;
}

// ============================================================
// INIT
// ============================================================
async function init() {
  render(); // show loading screen immediately
  await loadState();
  render();
  // Auto-refresh every 5 minutes (no-op in demo mode)
  setInterval(async () => {
    await refreshState();
    render();
  }, CONFIG.REFRESH_INTERVAL);
}

init();
</script>
</body>
</html>
